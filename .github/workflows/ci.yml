name: Backend CI

on:
  pull_request:
  push:
    branches: [main, feature/be-01-durable-persistence]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Ruff
        id: ruff
        shell: bash
        run: |
          set +e
          ruff check . > ruff-output.txt 2>&1
          status=$?
          cat ruff-output.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload Ruff diagnostic
        if: steps.ruff.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: ruff-diagnostic
          path: ruff-output.txt
      - name: Enforce Ruff
        if: steps.ruff.outputs.status != '0'
        run: exit 1
      - name: Mypy
        id: mypy
        shell: bash
        run: |
          set +e
          mypy app > mypy-output.txt 2>&1
          status=$?
          cat mypy-output.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload Mypy diagnostic
        if: steps.mypy.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: mypy-diagnostic
          path: mypy-output.txt
      - name: Enforce Mypy
        if: steps.mypy.outputs.status != '0'
        run: exit 1
      - name: Pytest
        id: pytest
        shell: bash
        run: |
          set +e
          pytest -q --cov=app --cov-report=term-missing > pytest-output.txt 2>&1
          status=$?
          cat pytest-output.txt
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload Pytest diagnostic
        if: steps.pytest.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: pytest-diagnostic
          path: pytest-output.txt
      - name: Enforce Pytest
        if: steps.pytest.outputs.status != '0'
        run: exit 1
      - name: FastAPI import smoke test
        run: python -c "from app.main import app; assert app.title == 'AstraForge Crypto Backend'"

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build container
        run: docker build -t astraforge-backend:${{ github.sha }} .
